<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPCFast Endpoint Checker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e1e4e8; min-height: 100vh; padding: 2rem; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #58a6ff; }
  .form-group { margin-bottom: 1rem; }
  label { display: block; margin-bottom: 0.3rem; font-size: 0.85rem; color: #8b949e; }
  input[type="text"], input[type="password"] { width: 100%; padding: 0.5rem 0.75rem; background: #161b22; border: 1px solid #30363d; border-radius: 6px; color: #e1e4e8; font-size: 0.9rem; }
  input:focus { outline: none; border-color: #58a6ff; }
  .radio-group { display: flex; gap: 1rem; align-items: center; margin-bottom: 0.5rem; }
  .radio-group label { display: inline; margin-bottom: 0; cursor: pointer; }
  .radio-group input[type="radio"] { margin-right: 0.3rem; }
  #client-id-input { margin-top: 0.5rem; display: none; }
  button { padding: 0.6rem 1.5rem; background: #238636; border: 1px solid #2ea043; border-radius: 6px; color: #fff; font-size: 0.9rem; cursor: pointer; font-weight: 500; }
  button:hover { background: #2ea043; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .results { margin-top: 1.5rem; display: flex; flex-direction: column; gap: 0.75rem; }
  .check-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; }
  .check-card.running { border-color: #d29922; }
  .check-card.ok { border-color: #2ea043; }
  .check-card.grade-green { border-color: #2ea043; }
  .check-card.grade-yellow { border-color: #d29922; }
  .check-card.grade-orange { border-color: #e3824a; }
  .check-card.grade-red { border-color: #f85149; }
  .check-card.error { border-color: #f85149; }
  .check-card.warning { border-color: #d29922; }
  .check-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
  .check-name { font-weight: 600; font-size: 0.95rem; }
  .check-endpoint { font-size: 0.75rem; color: #8b949e; margin-bottom: 0.5rem; word-break: break-all; }
  .badge { padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.75rem; font-weight: 500; }
  .badge.running { background: #d29922; color: #000; }
  .badge.ok { background: #2ea043; color: #fff; }
  .badge.grade-green { background: #2ea043; color: #fff; }
  .badge.grade-yellow { background: #d29922; color: #000; }
  .badge.grade-orange { background: #e3824a; color: #000; }
  .badge.grade-red { background: #f85149; color: #fff; }
  .badge.error { background: #f85149; color: #fff; }
  .badge.warning { background: #d29922; color: #000; }
  .check-details { font-size: 0.8rem; color: #8b949e; }
  .check-details table { width: 100%; }
  .check-details td { padding: 0.15rem 0; }
  .check-details td:first-child { color: #8b949e; width: 45%; }
  .check-details td:last-child { color: #e1e4e8; text-align: right; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #d29922; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 0.3rem; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .age-green { color: #2ea043; }
  .age-yellow { color: #d29922; }
  .age-orange { color: #e3824a; }
  .age-red { color: #f85149; }
  .check-details a { color: #58a6ff; text-decoration: none; }
  .check-details a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <h1>RPCFast Solana Endpoint Checker</h1>

  <div class="form-group">
    <label for="token">x-token (HTTP RPC API key)</label>
    <input type="text" id="token" placeholder="Enter your x-token / API key" autocomplete="off">
  </div>

  <div class="form-group">
    <label>API Endpoint</label>
    <div class="radio-group">
      <label><input type="radio" name="endpoint-type" value="saas" checked onchange="toggleEndpointFields()"> SaaS</label>
      <label><input type="radio" name="endpoint-type" value="dedicated" onchange="toggleEndpointFields()"> Dedicated</label>
    </div>
    <input type="text" id="client-id-input" placeholder="e.g. userid" autocomplete="off">
    <div id="saas-tokens" style="margin-top: 0.5rem;">
      <div class="form-group">
        <label for="yellowstone-token">Yellowstone gRPC token (optional)</label>
        <input type="text" id="yellowstone-token" placeholder="Leave empty to skip Yellowstone check" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="shredstream-token">Shredstream gRPC token (optional)</label>
        <input type="text" id="shredstream-token" placeholder="Leave empty to skip Shredstream check" autocomplete="off">
      </div>
    </div>
  </div>

  <button id="check-btn" onclick="runChecks()">Check Endpoints</button>

  <div class="results" id="results"></div>
</div>

<script>
const CHECK_LABELS = {
  jsonrpc_http: 'JSON RPC HTTP',
  yellowstone_grpc: 'Yellowstone gRPC',
  shredstream_grpc: 'Shredstream gRPC',
  jsonrpc_ws: 'JSON RPC WebSocket',
};

// Store endpoint info from status events so results can reference it
const cardEndpoints = {};

function escapeHtml(str) {
  const div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

function toggleEndpointFields() {
  const dedicated = document.querySelector('input[name="endpoint-type"][value="dedicated"]').checked;
  document.getElementById('client-id-input').style.display = dedicated ? 'block' : 'none';
  document.getElementById('saas-tokens').style.display = dedicated ? 'none' : 'block';
}

function ageGrade(seconds) {
  if (seconds == null) return null;
  if (seconds < 10) return 'green';
  if (seconds < 30) return 'yellow';
  if (seconds < 60) return 'orange';
  return 'red';
}

function ageClass(seconds) {
  const grade = ageGrade(seconds);
  return grade ? `age-${grade}` : '';
}

function gradeLabel(grade) {
  if (grade === 'green') return 'OK';
  if (grade === 'yellow') return 'Slow';
  if (grade === 'orange') return 'Degraded';
  if (grade === 'red') return 'Critical';
  return '';
}

function getCardGrade(data) {
  if (data.status === 'error') return null;
  return ageGrade(data.age_seconds);
}

function formatDetails(data) {
  const rows = [];
  if (data.timestamp) rows.push(['Checked at', escapeHtml(data.timestamp)]);
  if (data.endpoint) rows.push(['Endpoint', escapeHtml(data.endpoint)]);
  if (data.slot != null) rows.push(['Slot', `<a href="https://solscan.io/block/${data.slot}" target="_blank" rel="noopener">${data.slot.toLocaleString()}</a>`]);
  if (data.block_height != null) rows.push(['Block Height', data.block_height.toLocaleString()]);
  if (data.age_seconds != null) rows.push(['Block Age', `<span class="${ageClass(data.age_seconds)}">${data.age_seconds}s</span>`]);
  if (data.bytes_downloaded != null) rows.push(['Downloaded', `${(data.bytes_downloaded / 1024 / 1024).toFixed(2)} MB`]);
  if (data.grpc_messages != null) rows.push(['gRPC Messages', data.grpc_messages.toLocaleString()]);
  if (data.solana_entries_decoded != null) rows.push(['Entries Decoded', data.solana_entries_decoded.toLocaleString()]);
  if (data.transactions_seen != null) rows.push(['Transactions', data.transactions_seen.toLocaleString()]);
  if (data.slots_seen != null) rows.push(['Slots Seen', data.slots_seen.toLocaleString()]);
  if (data.slot_ahead != null) rows.push(['Slots Ahead of Confirmed', `<span class="${data.slot_ahead >= 0 ? 'age-green' : 'age-red'}">${data.slot_ahead > 0 ? '+' : ''}${data.slot_ahead}</span>`]);
  if (data.last_slot != null) rows.push(['Last Slot', `<a href="https://solscan.io/block/${data.last_slot}" target="_blank" rel="noopener">${data.last_slot.toLocaleString()}</a>`]);
  if (data.decode_errors != null && data.decode_errors > 0) rows.push(['Decode Errors', `<span class="age-orange">${data.decode_errors}</span>`]);
  if (data.speed_mbps != null) rows.push(['Speed', `${data.speed_mbps} Mbps`]);
  if (data.blocks_received != null) rows.push(['Blocks Received', data.blocks_received]);
  if (data.latest_slot != null) rows.push(['Latest Slot', `<a href="https://solscan.io/block/${data.latest_slot}" target="_blank" rel="noopener">${data.latest_slot.toLocaleString()}</a>`]);
  if (data.elapsed_seconds != null) rows.push(['Elapsed', `${data.elapsed_seconds}s`]);
  if (data.error) rows.push(['Error', `<span class="age-red">${escapeHtml(data.error)}</span>`]);
  if (data.message) rows.push(['Message', escapeHtml(data.message)]);
  if (!rows.length) return '';
  return '<table>' + rows.map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('') + '</table>';
}

function setCard(name, status, data) {
  let card = document.getElementById(`card-${name}`);
  if (!card) {
    card = document.createElement('div');
    card.id = `card-${name}`;
    card.className = 'check-card';
    document.getElementById('results').appendChild(card);
  }

  const grade = data ? getCardGrade(data) : null;
  const cardClass = status === 'running' ? 'running'
    : status === 'error' ? 'error'
    : grade ? `grade-${grade}` : status;
  card.className = `check-card ${cardClass}`;

  let badgeContent, badgeClass;
  if (status === 'running') {
    badgeContent = '<span class="spinner"></span>Running';
    badgeClass = 'running';
  } else if (status === 'error') {
    badgeContent = 'Error';
    badgeClass = 'error';
  } else if (grade) {
    badgeContent = `${gradeLabel(grade)} (${data.age_seconds}s)`;
    badgeClass = `grade-${grade}`;
  } else {
    badgeContent = status.charAt(0).toUpperCase() + status.slice(1);
    badgeClass = status;
  }

  card.innerHTML = `
    <div class="check-header">
      <span class="check-name">${CHECK_LABELS[name] || name}</span>
      <span class="badge ${badgeClass}">${badgeContent}</span>
    </div>
    ${data?.endpoint ? `<div class="check-endpoint">${escapeHtml(data.endpoint)}</div>` : ''}
    <div class="check-details">${data ? formatDetails(data) : ''}</div>
  `;
}

async function runChecks() {
  const httpToken = document.getElementById('token').value.trim();
  if (!httpToken) { alert('Please enter an x-token'); return; }

  const endpointType = document.querySelector('input[name="endpoint-type"]:checked').value;
  let clientId = null;
  let yellowstoneToken = null;
  let shredstreamToken = null;
  if (endpointType === 'dedicated') {
    clientId = document.getElementById('client-id-input').value.trim();
    if (!clientId) { alert('Please enter a client ID'); return; }
    clientId = clientId.toLowerCase();
    if (!/^[a-z0-9]([a-z0-9-]*[a-z0-9])?$/.test(clientId) || clientId.length > 64) {
      alert('Client ID must be lowercase alphanumeric with optional hyphens (max 64 chars)'); return;
    }
  } else {
    yellowstoneToken = document.getElementById('yellowstone-token').value.trim() || null;
    shredstreamToken = document.getElementById('shredstream-token').value.trim() || null;
  }

  const btn = document.getElementById('check-btn');
  btn.disabled = true;
  btn.textContent = 'Checking...';
  document.getElementById('results').innerHTML = '';

  try {
    const body = { http_token: httpToken, endpoint_type: endpointType };
    if (clientId) body.client_id = clientId;
    if (yellowstoneToken) body.yellowstone_token = yellowstoneToken;
    if (shredstreamToken) body.shredstream_token = shredstreamToken;
    const response = await fetch('/api/check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      let currentEvent = '';
      for (const line of lines) {
        if (line.startsWith('event:')) {
          currentEvent = line.slice(6).trim();
        } else if (line.startsWith('data:')) {
          const dataStr = line.slice(5).trim();
          try {
            const data = JSON.parse(dataStr);
            if (currentEvent === 'status') {
              setCard(data.check, 'running', data);
            } else if (currentEvent === 'result') {
              data.timestamp = new Date().toISOString();
              setCard(data.check, data.status || 'ok', data);
            }
          } catch (e) { /* ignore parse errors */ }
          currentEvent = '';
        }
      }
    }
  } catch (err) {
    const results = document.getElementById('results');
    results.innerHTML += `<div class="check-card error"><div class="check-header"><span class="check-name">Connection Error</span><span class="badge error">Error</span></div><div class="check-details">${escapeHtml(err.message)}</div></div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Check Endpoints';
  }
}
</script>
</body>
</html>
