image:
  repository: ghcr.io/dysnix/rpcfast-check-saas-endpoints
  tag: latest
  pullPolicy: Always

containerPorts:
  http: 8000

service:
  ports:
    http:
      port: 8000
      targetPort: http

ingress:
  enabled: false
  # hostname: check.rpcfast.net
  # tls: true

livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 30

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 3
  periodSeconds: 10

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
